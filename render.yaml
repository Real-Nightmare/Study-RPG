services:
  # Backend API (NestJS)
  - type: web
    name: study-rpg-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: ""
      - key: DATABASE_URL
        fromDatabase:
          name: study-rpg-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: study-rpg-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://study-rpg.onrender.com
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: NAVY_API_KEY
        sync: false
      - key: ADMIN_DEFAULT_PASSWORD
        sync: false

  # Frontend (Static site)
  - type: static
    name: study-rpg-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://study-rpg-backend.onrender.com
      - key: VITE_WS_URL
        value: https://study-rpg-backend.onrender.com
      - key: BACKEND_URL
        value: https://study-rpg-backend.onrender.com

  # PostgreSQL database
  - type: pgsql
    name: study-rpg-db
    plan: free
    databaseName: studyrpg
    user: studyrpg
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all IPs

  # Redis cache (optional)
  - type: redis
    name: study-rpg-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
