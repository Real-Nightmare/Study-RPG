# =============================================================================
# Study RPG — Runsite Configuration
# -----------------------------------------------------------------------------
# This file documents the intended infrastructure, but Runsite does not use
# render.yaml directly. Instead, configure environment variables in the
# Runsite dashboard for the backend service.
#
# Intended stack:
#   Frontend  → Cloudflare Pages
#   Backend   → Runsite (Docker Space)
#   Database  → Supabase (PostgreSQL + pgvector)
#   Cache     → Redis Cloud
#   Storage   → Dark Storage / Synclyz / Backblaze B2 / Blomp / local
# =============================================================================

# Note: Runsite auto-detects NestJS, TypeORM, BullMQ, and Redis.
# It provisions PostgreSQL and Redis automatically and injects DATABASE_URL
# and REDIS_URL. You can override them in the Runsite dashboard if you want
# to use Supabase or Redis Cloud instead.
