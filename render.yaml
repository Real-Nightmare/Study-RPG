# =============================================================================
# Study RPG — Render Blueprint (infrastructure-as-code)
# -----------------------------------------------------------------------------
# This is the SINGLE SOURCE OF TRUTH for production infrastructure.
# Hosting is Render-only (no Cloudflare Pages / MonkeysCloud / Neon).
# Deploy via Render Dashboard: New -> Blueprint -> connect this repo.
# See DEPLOY.md for full step-by-step instructions.
# =============================================================================

services:
  # Backend API (NestJS)
  - type: web
    name: study-rpg-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    healthCheckTimeout: 120
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: ""
      - key: DATABASE_URL
        fromDatabase:
          name: study-rpg-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: study-rpg-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://study-rpg-frontend.onrender.com
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: NAVY_API_KEY
        sync: false
      # Object storage (S3-compatible, no CC required)
      # Recommended: Dark Storage (5GB free) or Synclyz (10GB free)
      - key: S3_ACCOUNT_ID
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
      - key: S3_ENDPOINT
        sync: false
      # Alternative: Blomp (OpenStack Swift, 400GB free, no CC)
      - key: BLOMP_ACCOUNT_ID
        sync: false
      - key: BLOMP_ACCESS_KEY_ID
        sync: false
      - key: BLOMP_SECRET_ACCESS_KEY
        sync: false
      - key: BLOMP_BUCKET_NAME
        sync: false
      - key: BLOMP_PUBLIC_URL
        sync: false
      - key: BLOMP_AUTH_URL
        value: https://authenticate.blomp.com/v2.0/
      - key: ADMIN_DEFAULT_PASSWORD
        sync: false

  # Frontend (Static site)
  - type: static
    name: study-rpg-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://study-rpg-backend.onrender.com
      - key: VITE_WS_URL
        value: https://study-rpg-backend.onrender.com
      - key: BACKEND_URL
        value: https://study-rpg-backend.onrender.com

  # PostgreSQL database
  - type: pgsql
    name: study-rpg-db
    plan: free
    databaseName: studyrpg
    user: studyrpg
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all IPs

  # Redis cache (optional)
  - type: redis
    name: study-rpg-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

  # Note: Render free tier automatically sleeps after 15 minutes of inactivity.
  # To prevent sleep, use an external uptime monitor (e.g., UptimeRobot) to ping
  # https://study-rpg-backend.onrender.com/health every 10 minutes.
  # The health endpoint performs a quick DB and Redis ping.
